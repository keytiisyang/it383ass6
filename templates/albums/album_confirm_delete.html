{% extends 'base.html' %}
{% block title %}Delete Album{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h1>Delete Album</h1>
        <p>Are you sure you want to delete the album "{{ object.title }}"? This will also remove all photos inside it.</p>
        <form method="post">
            {% csrf_token %}
            <button class="btn btn-danger" type="submit">Yes, delete</button>
            <a class="btn btn-outline-secondary" href="{% url 'album-detail' object.pk %}">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
